<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trung Tâm Xử Lý Đề Thi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .dark body { background-color: #000000; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #27272a; }
        .paste-area:focus { outline: none; border-color: #6366f1 !important; }
        #print-area { display: none; }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-200 h-[100dvh] w-screen overflow-hidden flex flex-col transition-colors duration-300">

    <div class="absolute top-4 right-4 z-50">
        <button onclick="document.documentElement.classList.toggle('dark')" class="p-2.5 rounded-full bg-white dark:bg-black border border-slate-200 dark:border-zinc-800 shadow-sm outline-none">
            🌓 Giao diện Tối/Sáng
        </button>
    </div>

    <main class="flex-1 overflow-y-auto p-4 sm:p-10 pt-6">
        <div class="max-w-6xl mx-auto space-y-6">

            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-transparent pb-3 border-b border-slate-200 dark:border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-white dark:bg-zinc-900 border border-slate-200 shadow-sm text-indigo-600 flex-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-indigo-700 dark:text-indigo-400">Trình đóng gói đề thi JSON</h1>
                        <p class="text-sm text-slate-500">Mô phỏng kỳ thi 2026 - Không lỗi giao diện</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openGitHubSettings()" class="px-4 py-2 bg-slate-800 text-white rounded-lg shadow-sm font-bold text-sm">Cấu hình GitHub</button>
                </div>
            </div>

            <div class="bg-white dark:bg-black p-6 rounded-xl shadow-sm border border-slate-200 dark:border-zinc-800">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">0. Lấy lệnh (Prompt) cho AI</h2>
                    <button onclick="copyPrompt()" class="px-4 py-2 bg-indigo-100 hover:bg-indigo-200 dark:bg-indigo-900/50 dark:hover:bg-indigo-800 text-indigo-700 dark:text-indigo-300 font-bold rounded-lg shadow-sm transition text-sm flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                        COPY LỆNH
                    </button>
                </div>
                <textarea id="ai-prompt" class="w-full h-48 p-4 border border-slate-300 dark:border-zinc-700 rounded-lg font-mono text-sm bg-slate-50 dark:bg-zinc-900 focus:outline-none focus:border-indigo-500 resize-none" readonly>Đóng vai trò là một chuyên gia số hóa dữ liệu giáo dục và giáo viên luyện thi THPT Quốc gia. Tôi sẽ cung cấp một tài liệu chứa đề thi. Nhiệm vụ của bạn là trích xuất dữ liệu từ tài liệu đó và chuyển đổi chính xác thành một tệp định dạng JSON.

Dưới đây là các quy tắc bắt buộc:

1. TRÍCH XUẤT THÔNG TIN CHUNG (METADATA):
- "subject": Tự động nhận diện môn học và ghi Mã số. (00: Toán, 01: Vật lí, 02: Hóa học, 03: Sinh học, 04: Ngữ văn, 05: Lịch sử, 06: Địa lí, 07: Tiếng Anh, 08: GDKT & PL, 09: Tin học, 10: Công nghệ CN, 11: Công nghệ NN).
- "title": Tên đề thi (VD: "Đề thi thử Sở Hà Nội Lần 1").
- "timeLimit": Thời gian làm bài tính bằng GIÂY (VD: 90 phút -> 5400). Nếu trong đề không ghi, mặc định là 3000.
- Điểm số: 
  + "p1_points": 0.25 (Mặc định mọi môn).
  + "p2_points": [0.1, 0.25, 0.5, 1.0] (Mặc định mọi môn).
  + "p3_points": 0.5 đối với Toán; 0.25 đối với các môn khác.

2. CẤU TRÚC 3 PHẦN CỦA ĐỀ THI:
- part1 (Trắc nghiệm 4 lựa chọn): "ans" là số nguyên (0 tương ứng A, 1=B, 2=C, 3=D). 
- part2 (Trắc nghiệm Đúng/Sai): Mảng "items" KHÔNG kèm theo các chữ cái "a), b), c), d)" ở đầu câu. "ans" là mảng boolean [true, false, true, false].
- part3 (Trả lời ngắn): "ans" BẮT BUỘC TỐI ĐA 4 KÝ TỰ (đã tính dấu "-" và ","). Nếu là số thập phân, bắt buộc dùng dấu phẩy (,) không dùng dấu chấm (.). Ví dụ hợp lệ: "-1,5", "1693", "3,5".

3. XỬ LÝ HÌNH ẢNH & LỜI GIẢI (QUAN TRỌNG):
- Hình ảnh/Bảng biểu: Mọi bảng biểu đều phải coi là hình ảnh. TUYỆT ĐỐI KHÔNG chèn chữ "[CẦN_CHÈN_ẢNH]" vào nội dung text của câu hỏi ("q"). Phải tạo một trường mới ngang hàng với "q", đặt tên là "image": "[CẦN_CHÈN_ẢNH]".
- Lời giải: Trích xuất vào "explanation". Nếu không có sẵn lời giải, bạn hãy tự giải chính xác và viết chi tiết vào đây.
- Ảnh trong lời giải: Nếu lời giải có đồ thị/ảnh, tạo trường ngang hàng là "explanationImage": "[CẦN_CHÈN_ẢNH_GIẢI_THÍCH]".
- Câu hỏi chùm: SAO CHÉP toàn bộ đoạn văn bản ngữ cảnh dùng chung và gắn trực tiếp vào đầu trường "q" của TỪNG câu hỏi liên quan.

4. QUY TẮC BẢO MẬT JSON VÀ TOÁN HỌC (LUẬT THÉP):
- Cấm lỗi Escape LaTeX: Mọi ký tự gạch chéo ngược (\) trong LaTeX BẮT BUỘC phải nhân đôi (\\). VD ĐÚNG: \\frac{1}{2}, \\sqrt{x}. VD SAI: \frac{1}{2}.
- Định dạng Toán: Toàn bộ công thức toán học phải được bọc trong cặp dấu $.
- Cấm lỗi thẻ HTML: BẮT BUỘC phải có khoảng trắng ở hai bên dấu bé hơn (<) và lớn hơn (>). VD ĐÚNG: $x < y + 1$. VD SAI: $x<y+1$. KHÔNG tự ý nhấn phím Enter xuống dòng bên trong giá trị chuỗi (sẽ gây lỗi parse JSON). Để bẻ dòng, BẮT BUỘC gõ 2 ký tự \ và n liền nhau. (Ví dụ ĐÚNG: "Đoạn 1\nĐoạn 2").

5. CẤU TRÚC JSON MẪU BẮT BUỘC:
{
    "timeLimit": 5400,
    "subject": "00",
    "title": "Đề Khảo Sát",
    "p1_points": 0.25,
    "p2_points": [0.1, 0.25, 0.5, 1.0],
    "p3_points": 0.5,
    "part1": [ 
        { "q": "Nội dung câu hỏi?", "image": "[CẦN_CHÈN_ẢNH]", "options": ["Đáp án A", "Đáp án B", "Đáp án C", "Đáp án D"], "ans": 0, "explanation": "Chi tiết lời giải", "explanationImage": "[CẦN_CHÈN_ẢNH_GIẢI_THÍCH]" } 
    ],
    "part2": [ 
        { "q": "Nội dung câu hỏi lớn?", "items": ["Ý 1", "Ý 2", "Ý 3", "Ý 4"], "ans": [true, false, true, false], "explanation": "Chi tiết lời giải" } 
    ],
    "part3": [ 
        { "q": "Nội dung câu hỏi?", "ans": "-1,5", "explanation": "Chi tiết lời giải" } 
    ]
}</textarea>
            </div>

            <div class="bg-white dark:bg-black p-6 rounded-xl shadow-sm border border-slate-200 dark:border-zinc-800">
                <h2 class="text-lg font-bold mb-4">1. Nạp mã JSON từ AI trả về</h2>
                <textarea id="json-paste" class="w-full h-40 p-4 border border-slate-300 dark:border-zinc-700 rounded-lg font-mono text-sm bg-slate-50 dark:bg-zinc-900 focus:outline-none focus:border-indigo-500" placeholder="Dán toàn bộ mã JSON mà AI vừa tạo vào đây..."></textarea>
                <div class="flex justify-end mt-4">
                    <button onclick="processPastedJson()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg shadow-md transition">XỬ LÝ DỮ LIỆU</button>
                </div>
            </div>

            <div id="download-container" class="hidden bg-emerald-50 dark:bg-emerald-900/20 p-8 rounded-xl shadow-sm border border-emerald-200 text-center">
                <h2 class="text-2xl font-bold mb-2 text-emerald-800 dark:text-emerald-400">Tuyệt vời! File đã được mã hóa sẵn sàng</h2>
                <div class="flex justify-center gap-4 mt-6">
                    <button onclick="executeExport('download')" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-md">TẢI FILE .JSON XUỐNG MÁY</button>
                    <button onclick="executeExport('github')" class="px-6 py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl shadow-md">ĐẨY TRỰC TIẾP LÊN GITHUB</button>
                </div>
            </div>

            <div id="github-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex justify-center items-center">
                <div class="bg-white dark:bg-zinc-900 p-6 rounded-xl w-[400px]">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">Cấu hình GitHub API</h3>
                    <input type="password" id="gh-token" placeholder="GitHub PAT Token" class="w-full mb-3 p-2 border rounded text-slate-800">
                    <input type="text" id="gh-owner" placeholder="Tên tài khoản (Owner)" class="w-full mb-3 p-2 border rounded text-slate-800">
                    <input type="text" id="gh-repo" placeholder="Tên Kho (Repo)" class="w-full mb-4 p-2 border rounded text-slate-800">
                    <div class="flex justify-end gap-2">
                        <button onclick="document.getElementById('github-modal').classList.add('hidden')" class="px-4 py-2 bg-slate-200 rounded text-slate-800 font-bold">Hủy</button>
                        <button onclick="saveGitHubSettings()" class="px-4 py-2 bg-indigo-600 text-white rounded font-bold">Lưu lại</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        let examData = null;

        // Bổ sung hàm copy prompt
        function copyPrompt() {
            navigator.clipboard.writeText(document.getElementById('ai-prompt').value);
            alert("Đã copy lệnh AI! Thầy dán vào khung chat của Gemini/Claude nhé.");
        }

        function openGitHubSettings() {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('gh-owner').value = localStorage.getItem('gh_owner') || 'nttungvx'; // Cấu hình sẵn tên thầy
            document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || 'kt-on-thi-tn-vx'; // Cấu hình sẵn tên kho
            document.getElementById('github-modal').classList.remove('hidden');
        }
        function saveGitHubSettings() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
            localStorage.setItem('gh_owner', document.getElementById('gh-owner').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
            document.getElementById('github-modal').classList.add('hidden');
            alert("Lưu cấu hình GitHub thành công!");
        }

        function processPastedJson() {
            const text = document.getElementById('json-paste').value;
            try {
                let cleanText = text;
                const jsonStart = text.indexOf('{'), jsonEnd = text.lastIndexOf('}');
                if(jsonStart !== -1 && jsonEnd !== -1) cleanText = text.substring(jsonStart, jsonEnd + 1);

                examData = JSON.parse(cleanText);
                document.getElementById('download-container').classList.remove('hidden');
                alert("Nạp đề thi JSON thành công! Đề đã sẵn sàng để xuất bản.");
            } catch (err) {
                alert("Lỗi cấu trúc JSON từ AI: " + err.message + "\n\nHãy yêu cầu AI kiểm tra lại dấu ngoặc và dấu phẩy.");
            }
        }

        async function executeExport(mode) {
            if (!examData) return;

            if (!examData.examId) {
                let subjCode = examData.subject || "99";
                examData.examId = subjCode + Math.floor(Math.random()*1000).toString().padStart(3, '0');
            }

            const now = new Date();
            const timestamp = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + "_" + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
            const targetFileName = `${examData.examId}_${examData.subject}_${timestamp}.json`;

            if (mode === 'download') {
                const a = document.createElement("a");
                a.href = URL.createObjectURL(new Blob([JSON.stringify(examData, null, 4)], { type: "application/json" }));
                a.download = targetFileName;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            } 
            else if (mode === 'github') {
                const token = localStorage.getItem('gh_token');
                const owner = localStorage.getItem('gh_owner');
                const repo = localStorage.getItem('gh_repo');
                
                if (!token) return alert("Chưa cấu hình API Github!");

                const path = `data/${encodeURIComponent(targetFileName)}`;
                const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(examData, null, 4))));

                try {
                    const putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ message: "Upload Đề Thi", content: contentBase64 })
                    });
                    if (putRes.ok) alert("Đã đẩy thành công lên Cloud GitHub!");
                    else alert("Lỗi khi đẩy lên GitHub: " + (await putRes.json()).message);
                } catch (e) { alert("Lỗi kết nối GitHub API"); }
            }
        }
    </script>
</body>
