<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung Tâm Xử Lý Đề Thi - NTTPRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .prompt-box { background-color: #f8fafc; border: 1px solid #e2e8f0; }
        .custom-file-upload:hover { border-color: #6366f1; background-color: #e0e7ff; }
    </style>
</head>
<body class="text-slate-800 pb-20">

    <div class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 text-white flex items-center justify-center rounded-lg text-xl shadow-md">
                <i class="fa-solid fa-cube"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl text-slate-800 leading-tight">Trung Tâm Xử Lý Đề Thi JSON</h1>
                <p class="text-xs text-slate-500 font-medium">Hệ thống đồng bộ GitHub Cloud (kt-on-thi-tn-vx)</p>
            </div>
        </div>
        <button onclick="openConfig()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-bold text-sm transition shadow-sm border border-slate-300">
            <i class="fa-solid fa-gear mr-2"></i> Cấu hình GitHub
        </button>
    </div>

    <div class="max-w-5xl mx-auto mt-8 space-y-8 px-4">
        
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <span class="bg-indigo-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shadow-md">0</span>
                    <h2 class="text-lg font-bold text-slate-800">Lấy lệnh (Prompt) cho AI</h2>
                    <span class="text-xs text-slate-500 font-medium hidden sm:inline-block">Copy đoạn lệnh này, gửi cho AI kèm file đề gốc để lấy JSON.</span>
                </div>
                <button onclick="copyPrompt()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm">
                    <i class="fa-solid fa-copy"></i> COPY PROMPT
                </button>
            </div>
            <textarea id="ai-prompt" class="w-full h-32 p-4 prompt-box rounded-xl text-sm text-slate-700 outline-none resize-none font-medium leading-relaxed" readonly>Đóng vai trò là một chuyên gia số hóa dữ liệu giáo dục và giáo viên luyện thi THPT Quốc gia. Tôi sẽ cung cấp một tài liệu chứa đề thi. Nhiệm vụ của bạn là trích xuất dữ liệu từ tài liệu đó và chuyển đổi chính xác thành một tệp định dạng JSON.

Dưới đây là các quy tắc bắt buộc:
1. TRÍCH XUẤT THÔNG TIN CHUNG (METADATA):
- "subject": Tự động nhận diện môn học và ghi Mã (TOAN, LY, HOA, SINH, DIA, SU, GDKT-PL, TIN, CNCN, CNNN, NN).
- "timeLimit": Thời gian làm bài (tính bằng giây).
2. CẤU TRÚC JSON: Phân loại đúng vào "part1", "part2", "part3". Các công thức Toán học phải bọc trong dấu $...$ (inline) hoặc $$...$$ (block) theo chuẩn LaTeX.</textarea>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <span class="bg-indigo-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shadow-md">1</span>
                    <h2 class="text-lg font-bold text-slate-800">Nạp Đề Thi Mới / Sửa Đề Cũ</h2>
                </div>
                <button onclick="document.getElementById('gh-load-modal').classList.remove('hidden')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm border border-slate-300">
                    <i class="fa-solid fa-cloud-arrow-down"></i> TẢI ĐỀ TỪ GITHUB
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="custom-file-upload border-2 border-dashed border-slate-300 rounded-2xl p-8 flex flex-col items-center justify-center text-center transition cursor-pointer relative bg-slate-50">
                    <input type="file" id="file-upload" accept=".json" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="handleFileUpload(event)">
                    <i class="fa-solid fa-upload text-4xl text-slate-400 mb-4"></i>
                    <h3 class="font-bold text-slate-700 text-lg mb-1">Kéo thả file .json vào đây</h3>
                    <p class="text-slate-500 text-sm">Hoặc chạm để chọn từ thiết bị</p>
                </div>

                <div class="border border-slate-200 rounded-2xl p-5 bg-slate-50 flex flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-slate-700 text-sm">Dán trực tiếp Code JSON</span>
                        <button onclick="document.getElementById('json-paste').value=''" class="text-rose-500 hover:bg-rose-100 px-3 py-1 rounded-md transition text-xs font-bold flex items-center gap-1"><i class="fa-regular fa-trash-can"></i> XÓA TRẮNG</button>
                    </div>
                    <textarea id="json-paste" class="flex-1 w-full bg-
