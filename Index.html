    <script>
        let mangCauHoi = [];     
        let viTriHienTai = 0;    
        let baiLamHS = {};       
        let dapAnChuan = {};
        let danhDauHS = {}; 
        let daChamHS = {};  
        let currentTotalScore = 0;
        let thoiGianConLai = 90 * 60; 

        let bgUrl = "<?= hinhNen ?>"; 
        let bgActive = true;
        if (bgUrl && bgUrl !== "") {
            document.body.style.backgroundImage = `url('${bgUrl}')`;
            document.body.classList.add('has-bg');
            document.getElementById('btn-bg').style.display = 'block';
        }

        let isLightMode = false;
        function toggleLightMode() {
            isLightMode = !isLightMode;
            let btn = document.getElementById('btn-theme');
            if (isLightMode) {
                document.body.classList.add('light-mode');
                btn.innerHTML = '<i class="fa-solid fa-moon"></i> TỐI';
            } else {
                document.body.classList.remove('light-mode');
                btn.innerHTML = '<i class="fa-solid fa-sun"></i> SÁNG';
            }
        }

        function toggleBackground() {
            let btn = document.getElementById('btn-bg');
            bgActive = !bgActive;
            if (bgActive) {
                document.body.style.backgroundImage = `url('${bgUrl}')`;
                document.body.classList.add('has-bg');
                btn.innerHTML = '<i class="fa-solid fa-image-slash"></i> TẮT NỀN';
            } else {
                document.body.style.backgroundImage = 'none';
                document.body.classList.remove('has-bg');
                btn.innerHTML = '<i class="fa-solid fa-image"></i> BẬT NỀN';
            }
        }

        let soLanCanhBao = 0;
        const MAX_CANH_BAO = 3; 
        let isExamActive = false; 

        function moToanManHinh() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); } 
            isExamActive = true;
        }

        function xuLyViPham(lyDo) {
            if (!isExamActive) return; 
            
            soLanCanhBao++;

                nopBai(true);

        document.addEventListener("visibilitychange", function() {

            if (!document.fullscreenElement && isExamActive) {
                xuLyViPham("Phát hiện hành vi thoát chế độ Toàn Màn Hình.");
            }
        });
        
        let monThiHienTai = 'TOAN'; 
        let diemMoiCauP3 = 0.5;

        function extractOptionsSafe(htmlStr, expectedLetters, regexStr) {
            let qText = htmlStr, opts = {};
            let regex = new RegExp(regexStr, 'gi');
            let matches = [];
            let match;
            
            while ((match = regex.exec(htmlStr)) !== null) {
                matches.push(match);
            }
            
            let validMatches = [], expIdx = 0;
            for (let i = 0; i < matches.length; i++) {
                if (matches[i][1].toUpperCase() === expectedLetters[expIdx].toUpperCase()) {
                    validMatches.push(matches[i]);
                    expIdx++;
                    if (expIdx === expectedLetters.length) break;
                }
            }
            
            if (validMatches.length === expectedLetters.length) {
                qText = htmlStr.substring(0, validMatches[0].index);
                
                for(let i=0; i < expectedLetters.length; i++) {
                    let letter = expectedLetters[i];
                    let start = validMatches[i].index + validMatches[i][0].length;
                    let end = (i + 1 < expectedLetters.length) ? validMatches[i+1].index : htmlStr.length;
                    let text = htmlStr.substring(start, end);
                    
                    text = text.replace(/^(?:<\/b>|<\/strong>|\s|&nbsp;|<br\s*\/?>)+/i, '').trim();
                    opts[letter] = text;
                }
                return { qText, opts };
            }
            return null;
        }

        function extractOptions(htmlStr) {
            return extractOptionsSafe(
                htmlStr, 
                ['A','B','C','D'], 
                "(?:^|>|\\s|&nbsp;|<p>|<br>)(?:<b>|<strong>)?([A-D])(?:<\\/b>|<\\/strong>)?\\.(?!\\w)"
            );
        }

        function extractTFOptions(htmlStr) {
            return extractOptionsSafe(
                htmlStr, 
                ['a','b','c','d'], 
                "(?:^|>|\\s|&nbsp;|<p>|<br>)(?:<b>|<strong>)?([a-d])(?:<\\/b>|<\\/strong>)?\\)(?!\\w)"
            );
        }

        // =================================================================
        // THUẬT TOÁN "GIẢI PHẪU DOM" CHỐNG NUỐT CÂU TRONG MỌI TRƯỜNG HỢP
        // =================================================================
        function bocTachDeThi(htmlRaw) {
            // Chuyển đổi các mốc ẩn của AI thành Text tàng hình
            htmlRaw = htmlRaw.replace(/<g([1-9][0-9]*)>/gi, ' [MO_CHUM] ');
            htmlRaw = htmlRaw.replace(/<\/?\s*#?\s*g\s*[1-9][0-9]*\s*\/?>/gi, ' [DONG_CHUM] ');
            htmlRaw = htmlRaw.replace(/<g>\s*<\/g>/gi, ' [HET_CAU] ');
            htmlRaw = htmlRaw.replace(/<g\s*\/>/gi, ' [HET_CAU] ');
            htmlRaw = htmlRaw.replace(/\[HET_CAU\]/gi, ' [HET_CAU] ');

            let initDiv = document.createElement('div'); 
            initDiv.innerHTML = htmlRaw;
            
            let timeCfg = initDiv.querySelector('#exam-config-time');
            if(timeCfg && timeCfg.dataset.time) {
                thoiGianConLai = parseInt(timeCfg.dataset.time) * 60;
                let phut = Math.floor(thoiGianConLai / 60); let giay = thoiGianConLai % 60;
                document.getElementById('time-display').innerText = (phut<10?"0":"") + phut + ":" + (giay<10?"0":"") + giay;
            }

            let monCfg = initDiv.querySelector('#exam-config-mon');
            if(monCfg && monCfg.dataset.mon) {
                monThiHienTai = monCfg.dataset.mon;
                diemMoiCauP3 = (monThiHienTai === 'TOAN') ? 0.5 : 0.25;
            }

            let scriptTag = initDiv.querySelector('#dap-an-chuan');
            if(scriptTag) { try { dapAnChuan = JSON.parse(scriptTag.innerText); } catch(e) {} scriptTag.remove(); }
            
            // BƯỚC 1: GIẢI PHẪU DOM TÌM CÁC CÂU HỎI BỊ AI NHÉT CHUNG
            let boldTags = initDiv.querySelectorAll('b, strong');
            boldTags.forEach(b => {
                let txt = b.innerText.trim();
                // Nhận diện thẻ bọc tên Câu hoặc Phần
                if (/^(Câu\s*\d+|PHẦN\s*[I1234IV]+)[\.\:\;\s]/i.test(txt) || /^(Câu\s*\d+|PHẦN\s*[I1234IV]+)$/i.test(txt)) {
                    // Nếu nó đang nằm trong phần giải thích thì bỏ qua
                    if (b.closest('.loi-giai-chi-tiet')) return;
                    
                    // Cắm một mốc cách ly tuyệt đối ngay trước thẻ này
                    let marker = document.createElement('span');
                    marker.className = 'moc-cach-ly';
                    b.parentNode.insertBefore(marker, b);
                }
            });

            // BƯỚC 2: CHẶT HTML RA THÀNH TỪNG KHÚC CHUẨN XÁC DỰA TRÊN MỐC CÁCH LY
            let parts = initDiv.innerHTML.split(/<span class="moc-cach-ly"><\/span>/i);

            let ketQua = [], phan = 1, objCau = null, idDem = {1: 0, 2: 0, 3: 0, 4: 0}; 
            let regPhan = /^PHẦN\s*([I1234IV]+)/i;
            let regCau = /^Câu\s*\d+[\.\;\:\s]/i; 
            let stopParsing = false; 
            let sharedContext = ""; 

            parts.forEach(partHTML => {
                if(stopParsing) return;
                
                let el = document.createElement('div');
                el.innerHTML = partHTML;
                
                let txt = el.innerText || "";
                let rawTxt = el.innerHTML || "";

                if (/^(LỜI GIẢI CHI TIẾT|HƯỚNG DẪN GIẢI|ĐÁP ÁN CHI TIẾT)/i.test(txt.trim()) && !el.querySelector('.loi-giai-chi-tiet')) {
                    stopParsing = true; 
                    return;
                }

                if (rawTxt.includes('[DONG_CHUM]')) { sharedContext = ""; el.innerHTML = el.innerHTML.replace(/\[DONG_CHUM\]/g, ''); }
                if (rawTxt.includes('[MO_CHUM]')) { sharedContext = ""; el.innerHTML = el.innerHTML.replace(/\[MO_CHUM\]/g, ''); }
                
                let isDongCau = false;
                if (rawTxt.includes('[HET_CAU]')) { isDongCau = true; el.innerHTML = el.innerHTML.replace(/\[HET_CAU\]/g, ''); }

                txt = el.innerText || ""; 
                if(!txt.trim() && !el.querySelector('img')) return; 

                if(regPhan.test(txt.trim())) {
                    let match = txt.match(regPhan)[1].toUpperCase();
                    if(match === 'I' || match === '1') phan = 1; else if(match === 'II' || match === '2') phan = 2; else if(match === 'III' || match === '3') phan = 3; else if(match === 'IV' || match === '4') phan = 4;
                    sharedContext = ""; 
                    return;
                }
                
                let isLoiGiai = el.classList && el.classList.contains('loi-giai-chi-tiet');
                if (el.querySelector('.doan-van-chung')) {
                    sharedContext = el.innerHTML; 
                    return;
                }

                // Nhận diện đây là một câu hỏi mới nhờ mốc đã cắm
                if((regCau.test(txt.trim()) || /^Câu\s*\d+$/i.test(txt.trim())) && !isLoiGiai) {
                    if(objCau) ketQua.push(objCau); 
                    idDem[phan]++;
                    
                    let cauHtml = sharedContext + el.innerHTML;
                    objCau = { phan: phan, soThuTu: idDem[phan], id: `P${phan}_${idDem[phan]}`, html: cauHtml };
                } else { 
                    if(objCau) {
                        objCau.html += el.innerHTML; 
                    } else {
                        if (/^(Read the following|Read the passage|Read the leaflet|Đọc đoạn văn|Read the text)/i.test(txt.trim())) {
                            sharedContext = el.innerHTML; 
                        } else {
                            sharedContext += el.innerHTML;
                        }
                    }
                }

                if (isDongCau && objCau) {
                    ketQua.push(objCau);
                    objCau = null;
                }
            });
            
            if(objCau) ketQua.push(objCau); 
            return ketQua;
        }

        window.handleSegmentedInput = function(cauId, index, event) {
            let container = document.getElementById('seg-container-' + cauId);
            let inputs = container.querySelectorAll('.char-box');
            let val = event.target.value;
            if (val === ' ') { event.target.value = ''; return; }
            if (val !== '' && index < inputs.length - 1) { inputs[index + 1].focus(); }
            let finalVal = Array.from(inputs).map(inp => inp.value).join('');
            luuDapAn(cauId, finalVal);
        };

        window.handleSegmentedKeydown = function(cauId, index, event) {
            let container = document.getElementById('seg-container-' + cauId);
            let inputs = container.querySelectorAll('.char-box');
            if (event.key === 'Backspace' && event.target.value === '' && index > 0) { inputs[index - 1].focus(); }
        };

            viTriHienTai = index;

            document.getElementById('current-q-badge').innerText = `PHẦN ${cau.phan} - CÂU ${cau.soThuTu}`;
            capNhatNutDanhDau(cau.id); 

            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = cau.html;
            
            let lgDiv = tempDiv.querySelector('.loi-giai-chi-tiet');
            let loiGiaiHTML = "<span style='color:#888; font-size:14px; font-style:italic;'>(Chưa có lời giải chi tiết cho câu hỏi này)</span>";
            
            if (lgDiv) {
                loiGiaiHTML = lgDiv.innerHTML; 
                lgDiv.remove(); 
            }
            
            let contentHTML = tempDiv.innerHTML;

                    });

                        let dis = isGraded ? 'disabled' : '';
                        let displayOpt = val + ". ";

                    if(soYdung === 1) diemToanCau = 0.1; else if(soYdung === 2) diemToanCau = 0.25; else if(soYdung === 3) diemToanCau = 0.5; else if(soYdung === 4) diemToanCau = 1.0;
                    currentTotalScore += diemToanCau;

                            if(ansG === 'Đ' && ans !== 'Đ') iconT = '<i class="fa-solid fa-circle-check" style="color:#22c55e; position:absolute; right:-25px; top:3px;"></i>';
                            if(ansG === 'S' && ans !== 'S') iconF = '<i class="fa-solid fa-circle-check" style="color:#22c55e; position:absolute; right:-25px; top:3px;"></i>';

        function chuyenCau(step) { renderCauHoi(viTriHienTai + step); }
        function luuDapAn(id, giatri) { baiLamHS[id] = giatri; renderMiniMap(); }
        
        function luuDapAnP2(id, y, giatri) { 
            if (monThiHienTai === 'TIN') {
                let countP2 = 0;
                for (let k in baiLamHS) {
                    if (k.startsWith('P2_') && Object.keys(baiLamHS[k]).length > 0) countP2++;
                }
                if ((!baiLamHS[id] || Object.keys(baiLamHS[id]).length === 0) && countP2 >= 4) {
                    alert("Môn Tin học: Phần II bạn chỉ được phép chọn làm 4 câu.\nVui lòng bấm 'Xóa đáp án' ở một câu đã chọn khác trước khi làm câu này.");
                    renderCauHoi(viTriHienTai);
                    return;
                }
            }
            if(!baiLamHS[id]) baiLamHS[id] = {}; 
            baiLamHS[id][y] = giatri; 
            renderMiniMap(); 
        }

        function renderMiniMap() {
            let mapContainer = document.getElementById('minimap-content');
            mapContainer.innerHTML = "";
            let daLam = 0, currentPhan = 0, gridHTML = "";

            mangCauHoi.forEach((cau, idx) => {
                if (cau.phan !== currentPhan) {
                    if (currentPhan !== 0) gridHTML += `</div>`; 
                    let tenPhan = cau.phan === 1 ? "Trắc nghiệm" : cau.phan === 2 ? "Đúng/Sai" : cau.phan === 3 ? "Trả lời ngắn" : "Tự luận";
                    gridHTML += `<div class="map-title">Phần ${cau.phan}: ${tenPhan}</div><div class="nav-grid">`;
                    currentPhan = cau.phan;
                }

                let isAnswered = false;
                if(cau.phan === 1 || cau.phan === 3) { if(baiLamHS[cau.id] && baiLamHS[cau.id].trim() !== "") { isAnswered = true; daLam++; } } 
                else if (cau.phan === 2) { if(baiLamHS[cau.id] && Object.keys(baiLamHS[cau.id]).length > 0) { isAnswered = true; daLam++; } } 

                let cls = "nav-btn";
                if(isAnswered) cls += " answered";
                if(danhDauHS[cau.id]) cls += " marked-nav"; 
                if(idx === viTriHienTai) cls += " active";

                gridHTML += `<button class="${cls}" onclick="renderCauHoi(${idx})">${cau.soThuTu}</button>`;
            });
            gridHTML += `</div>`; 
            mapContainer.innerHTML = gridHTML;

            let phanTram = mangCauHoi.length > 0 ? Math.round((daLam / mangCauHoi.length) * 100) : 0;
            document.getElementById('progress-fill').style.width = phanTram + "%";
            document.getElementById('progress-txt').innerText = `${phanTram}% (${daLam}/${mangCauHoi.length})`;
        }

                if (thoiGianConLai <= 300) { document.getElementById('timer-box').style.background = 'rgba(239, 68, 68, 0.1)'; document.getElementById('timer-box').style.color = '#ef4444'; document.getElementById('timer-box').style.borderColor = 'rgba(239, 68, 68, 0.3)'; }
                if (thoiGianConLai <= 0) { clearInterval(dongHo); document.getElementById('time-display').innerText = "00:00"; alert("⏰ ĐÃ HẾT THỜI GIAN LÀM BÀI! Hệ thống đang khóa bài..."); nopBai(true); }
            }, 1000); 
        }

        function nopBai(force = false) {
            if(!force && !confirm("Bạn có chắc chắn muốn nộp bài? Sau khi nộp sẽ không thể sửa lại!")) return;
            clearInterval(dongHo); isExamActive = false;
            let screen = document.getElementById('start-screen'); screen.style.display = 'flex'; screen.innerHTML = '<h2 style="color:white;"><i class="fa-solid fa-spinner fa-spin"></i> ĐANG TÍNH ĐIỂM & LƯU BÀI...</h2>';

            let tongDiem = 0, soCauP1 = 0, soCauP3 = 0, thongKeP2 = "", diemToiDaTracNghiem = 0;
            let countP2Total = 0;

            for(let key in dapAnChuan) {
               if(key.startsWith("P1_")) diemToiDaTracNghiem += 0.25;
               if(key.startsWith("P2_") && key.endsWith("a")) {
                   countP2Total++;
                   if (monThiHienTai !== 'TIN' || countP2Total <= 4) diemToiDaTracNghiem += 1.0;
               }
               if(key.startsWith("P3_")) diemToiDaTracNghiem += diemMoiCauP3;
            }

            mangCauHoi.filter(c => c.phan === 1).forEach(cau => { let ans = baiLamHS[cau.id], ansGoc = dapAnChuan[cau.id]; if(ans && ansGoc && ans.toUpperCase() === ansGoc.toUpperCase()) { tongDiem += 0.25; soCauP1++; } });
            
            let countP2Scored = 0;
            mangCauHoi.filter(c => c.phan === 2).forEach(cau => {
                let hasAns = baiLamHS[cau.id] && Object.keys(baiLamHS[cau.id]).length > 0;
                if (monThiHienTai === 'TIN' && hasAns) {
                    countP2Scored++;
                    if (countP2Scored > 4) return; 
                }

                let soYdung = 0;
                ['a','b','c','d'].forEach(y => { let ans = baiLamHS[cau.id] ? baiLamHS[cau.id][y] : null, ansGoc = dapAnChuan[`${cau.id}${y}`]; if(ans && ansGoc && ans.toUpperCase() === ansGoc.toUpperCase()) soYdung++; });
                let diemCauNay = 0; if(soYdung === 1) diemCauNay = 0.1; else if(soYdung === 2) diemCauNay = 0.25; else if(soYdung === 3) diemCauNay = 0.5; else if(soYdung === 4) diemCauNay = 1.0;
                tongDiem += diemCauNay; if(dapAnChuan[`${cau.id}a`]) thongKeP2 += `Câu ${cau.soThuTu}: Đúng ${soYdung}/4 ý (+${diemCauNay}đ)<br>`;
            });

            mangCauHoi.filter(c => c.phan === 3).forEach(cau => { let ans = baiLamHS[cau.id], ansGoc = dapAnChuan[cau.id]; if(ans && ansGoc && ans.trim().replace(',', '.') === ansGoc.toString().trim().replace(',', '.')) { tongDiem += diemMoiCauP3; soCauP3++; } });

            let dataHS = JSON.parse(sessionStorage.getItem('DATA_HS') || '{}');
            let duLieuDiem = { 
               maHS: dataHS.maHS || "Lỗi mã", 
               tenHS: dataHS.tenHS || "Khách", 
               lop: dataHS.lop || "Chưa phân lớp", 
               maDe: dataHS.maDe || "<?= made ?>", 
               diemTN: tongDiem.toFixed(2), 
               chiTiet: `Đúng ${soCauP1} câu P1, Đúng ${soCauP3} câu P3`,
               mon: monThiHienTai 
            };

            const hienThiKetQua = () => {
               screen.innerHTML = `
                  <h1 style="color:#22c55e; font-size:40px; margin-bottom: 20px;"><i class="fa-solid fa-circle-check"></i> NỘP BÀI THÀNH CÔNG!</h1>
                  <div style="background: #111; padding: 30px; border-radius: 15px; text-align: center; width: 450px; max-width:90%; border: 1px solid #333;">
                     <h3 style="color: #fff; margin: 0 0 10px 0;">ĐIỂM TRẮC NGHIỆM</h3>
                     <div style="font-size: 70px; font-weight: 900; color: #ef4444; line-height: 1;">${tongDiem.toFixed(2).replace('.', ',')}</div>
                     <div style="font-size: 16px; color: #888; font-weight: bold; margin-top: 10px; margin-bottom: 20px;">/ ${diemToiDaTracNghiem.toFixed(2).replace('.', ',')} Điểm tối đa</div>
                     <div style="background: #000; border-radius: 10px; padding: 15px; text-align: left; font-size: 14px; border: 1px solid #222; color: #ccc;">
                        <div style="margin-bottom: 5px;"><b>Phần I:</b> Đúng ${soCauP1} câu (+${(soCauP1 * 0.25).toFixed(2).replace('.', ',')}đ)</div>
                        <div style="margin-bottom: 5px;"><b>Phần II:</b><br>${thongKeP2.replace(/\./g, ',')}</div>
                        <div style="margin-bottom: 5px;"><b>Phần III:</b> Đúng ${soCauP3} câu (+${(soCauP3 * diemMoiCauP3).toFixed(2).replace('.', ',')}đ)</div>
                     </div>
                  </div>
                  <button class="btn-start-exam" style="margin-top: 30px; font-size: 16px; padding: 15px 30px; background:#ef4444;" onclick="window.top.location.href='<?= appUrl ?>'"> THOÁT VỀ TRANG CHỦ </button>
               `;
            };
            google.script.run.withSuccessHandler(function(res) { setTimeout(hienThiKetQua, 500); }).luuDiemTuDong(duLieuDiem);
        }
    </script>
</body>
</html>
