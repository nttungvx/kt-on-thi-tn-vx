<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script>MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };</script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; }
    .admin-header { background: #90caf9; color: #000; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; font-weight: bold; }
    .horizontal-tabs { display: flex; background: #1a1a1a; padding: 10px 25px 0; border-bottom: 1px solid #333; gap: 5px; }
    .tab-btn { background: #2a2a2a; border: none; padding: 10px 20px; color: #ccc; cursor: pointer; border-radius: 8px 8px 0 0; transition: 0.3s; }
    .tab-btn.active { background: #333; color: #90caf9; font-weight: bold; }
    
    /* Giao diện Đăng nhập Admin */
    .login-box { max-width: 400px; margin: 100px auto; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; text-align: center; }
    .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
    .btn-login { width: 100%; padding: 12px; background: #90caf9; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    /* NÚT MỚI: MỞ CÔNG CỤ TẠO ĐỀ */
    .btn-tool { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s; }
    .btn-tool:hover { background: #059669; }
  </style>
</head>
<body>

  <div id="login-section" class="login-box">
    <h2 style="margin-top: 0;"><i class="fa-solid fa-lock"></i> ĐĂNG NHẬP QUẢN TRỊ</h2>
    <input type="text" id="admin-user" class="input-field" placeholder="Tên đăng nhập">
    <input type="password" id="admin-pass" class="input-field" placeholder="Mật khẩu">
    <button class="btn-login" onclick="login()">ĐĂNG NHẬP</button>
    
    <button class="btn-tool" onclick="window.open('https://nttungvx.github.io/thi-tot-nghiep-vinh-xuan/packager.html', '_blank')">
        <i class="fa-solid fa-laptop-code"></i> MỞ CÔNG CỤ TẠO ĐỀ
    </button>
  </div>

  <div id="admin-content" style="display:none;">
    <div class="admin-header">
      <div>QUẢN TRỊ HỆ THỐNG NTTPRO 2026</div>
      <button onclick="location.reload()" style="background:transparent; border:none; cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i> Thoát</button>
    </div>
    </div>

  <script>
    function login() {
      var u = document.getElementById('admin-user').value;
      var p = document.getElementById('admin-pass').value;
      google.script.run.withSuccessHandler(function(isLogin) {
        if(isLogin) {
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('admin-content').style.display = 'block';
        } else {
          alert('Sai thông tin đăng nhập!');
        }
      }).checkAdminLogin(u, p);
    }
  </script>
</body>
</html>
